name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          xcodebuild -scheme ClaudeTokenTracker \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/ClaudeTokenTracker.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_HARDENED_RUNTIME=YES \
            MARKETING_VERSION="$VERSION"

      - name: Package
        run: |
          TAG=${GITHUB_REF_NAME}
          APP_PATH="build/ClaudeTokenTracker.xcarchive/Products/Applications/Claude Token Tracker.app"

          # Create DMG
          mkdir -p build/dmg
          cp -R "$APP_PATH" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "Claude Token Tracker" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/ClaudeTokenTracker-${TAG}.dmg"

          # Create ZIP (versioned + latest for Homebrew)
          cd build/dmg
          zip -r "../ClaudeTokenTracker-${TAG}.zip" "Claude Token Tracker.app"
          cp "../ClaudeTokenTracker-${TAG}.zip" "../ClaudeTokenTracker-latest.zip"

      - name: Generate release notes
        run: |
          TAG=${GITHUB_REF_NAME}
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..${TAG})
          fi

          cat << EOF > release_notes.md
          ## Claude Token Tracker ${TAG}

          ### Installation

          **Homebrew:**
          \`\`\`bash
          brew install --cask devsungmin/tap/claude-token-tracker
          \`\`\`

          **Manual:** Download **ClaudeTokenTracker-${TAG}.dmg** below.

          ### What's Changed

          ${COMMITS}

          ### Requirements

          - macOS 13 Ventura or later
          - Claude Pro / Max / Team / Enterprise plan
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            build/ClaudeTokenTracker-${{ github.ref_name }}.dmg
            build/ClaudeTokenTracker-${{ github.ref_name }}.zip
            build/ClaudeTokenTracker-latest.zip
          draft: false
          prerelease: false

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        if: env.TAP_GITHUB_TOKEN != ''
        run: |
          TAG=${GITHUB_REF_NAME}
          SHA=$(shasum -a 256 build/ClaudeTokenTracker-latest.zip | awk '{print $1}')

          # Clone tap repo and update cask
          git clone https://github.com/devsungmin/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          git remote set-url origin "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/devsungmin/homebrew-tap.git"
          cd -
          mkdir -p /tmp/homebrew-tap/Casks

          # New cask: claude-token-tracker
          cat > /tmp/homebrew-tap/Casks/claude-token-tracker.rb << CASK
          cask "claude-token-tracker" do
            version "${TAG#v}"
            sha256 "${SHA}"

            url "https://github.com/devsungmin/claude-usage-tracker/releases/download/${TAG}/ClaudeTokenTracker-${TAG}.zip"
            name "Claude Token Tracker"
            desc "Real-time Claude AI token usage monitor for the macOS menu bar"
            homepage "https://github.com/devsungmin/claude-usage-tracker"

            depends_on macos: ">= :ventura"

            app "Claude Token Tracker.app"

            zap trash: [
              "~/Library/Preferences/dev.sungmin.ClaudeUsageTracker.plist",
            ]
          end
          CASK

          # Deprecated cask: claude-usage-tracker (backward compat for existing users)
          cat > /tmp/homebrew-tap/Casks/claude-usage-tracker.rb << CASK
          cask "claude-usage-tracker" do
            version "${TAG#v}"
            sha256 "${SHA}"

            url "https://github.com/devsungmin/claude-usage-tracker/releases/download/${TAG}/ClaudeTokenTracker-${TAG}.zip"
            name "Claude Token Tracker"
            desc "Renamed to claude-token-tracker. This cask is kept for backward compatibility."
            homepage "https://github.com/devsungmin/claude-usage-tracker"

            depends_on macos: ">= :ventura"

            app "Claude Token Tracker.app"

            zap trash: [
              "~/Library/Preferences/dev.sungmin.ClaudeUsageTracker.plist",
            ]
          end
          CASK

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/claude-token-tracker.rb Casks/claude-usage-tracker.rb
          git commit -m "Rename claude-usage-tracker to claude-token-tracker ${TAG}" || true
          git push
